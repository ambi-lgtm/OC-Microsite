  function renderOC(alpha){
    offCtx.clearRect(0,0,W,H);
    var sz=clamp(W*0.13,54,188);
    offCtx.save();
    offCtx.textAlign='center';offCtx.textBaseline='middle';
    offCtx.font=sz+'px '+NF;
    offCtx.fillStyle='rgba(240,234,216,'+alpha+')';
    offCtx.fillText('Open', W*0.5,H*0.44-sz*0.55);
    offCtx.fillText('Court',W*0.5,H*0.44+sz*0.55);
    offCtx.restore();
  }

  // Render RSVP content to offscreen for pixel-assembly
  function renderRSVP(alpha){
    offCtx.clearRect(0,0,W,H);
    offCtx.save();
    offCtx.textAlign='center';offCtx.textBaseline='middle';
    // Eyebrow
    offCtx.font=clamp(W*0.010,8,14)+'px '+NF;
    offCtx.fillStyle='rgba(240,234,216,'+alpha*0.35+')';
    offCtx.fillText('Entry by invitation only',W*0.5,H*0.30);
    // Headline
    var hsz=clamp(W*0.085,38,110);
    offCtx.font=hsz+'px '+NF;
    offCtx.fillStyle='rgba(240,234,216,'+alpha+')';
    offCtx.fillText('The court',W*0.5,H*0.44-hsz*0.55);
    offCtx.fillText('is open.',W*0.5,H*0.44+hsz*0.55);
    // Date line
    offCtx.font=clamp(W*0.011,9,15)+'px '+NF;
    offCtx.fillStyle='rgba(240,234,216,'+alpha*0.38+')';
    offCtx.fillText('30 · 04 · 26  ·  Phoenix Court  ·  London NW1 1DX',W*0.5,H*0.60);
    // Button border handled by CSS ::after SVG, not drawn here
    offCtx.font=clamp(W*0.010,8,13)+'px '+NF;
    offCtx.fillStyle='rgba(240,234,216,'+alpha+')';
    offCtx.fillText('Claim your seat',W*0.5,H*0.69);
    offCtx.restore();
  }

  var linkCer  =document.getElementById('link-cer');
  var linkRen  =document.getElementById('link-ren');
  var featLabel=document.getElementById('featuring-label');
  var rsvpScene=document.getElementById('rsvp-scene');

  // Track whether RSVP DOM scene is showing
  var rsvpDOMShowing = false;

  function frame(){
    requestAnimationFrame(frame);
    var p=prog();
    var T=(Date.now()-t0)/1000;
    ctx.clearRect(0,0,W,H);
    var cx=W*0.5,cy=H*0.5;
    var sky=skyAt(p);

    // Background
    var bg=ctx.createRadialGradient(cx,cy*0.72,0,cx,cy*0.72,Math.max(W,H)*0.95);
    bg.addColorStop(0,   'rgba('+((sky[0]+18)|0)+','+((sky[1]+16)|0)+','+((sky[2]+8)|0)+',1)');
    bg.addColorStop(0.45,'rgba('+(sky[0]|0)+','+(sky[1]|0)+','+(sky[2]|0)+',1)');
    bg.addColorStop(1,   'rgba('+((sky[0]*0.35)|0)+','+((sky[1]*0.35)|0)+','+((sky[2]*0.35)|0)+',1)');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    // RSVP finale — bloom a saturated teal-ember vignette into the background
    var rsvpBloom=ss(0.85,0.97,p);
    if(rsvpBloom>0.003){{
      var bloom=ctx.createRadialGradient(cx,cy*0.75,0,cx,cy*0.75,Math.max(W,H)*0.85);
      bloom.addColorStop(0,  'rgba(14,88,70,'  +rsvpBloom*0.72+')');
      bloom.addColorStop(0.5,'rgba(10,60,48,'  +rsvpBloom*0.45+')');
      bloom.addColorStop(1,  'rgba(4, 22,18,'  +rsvpBloom*0.30+')');
      ctx.fillStyle=bloom;ctx.fillRect(0,0,W,H);
      // Warm amber counter-glow from bottom
      var amber=ctx.createLinearGradient(0,H*0.6,0,H);
      amber.addColorStop(0,'rgba(150,75,12,0)');
      amber.addColorStop(1,'rgba(150,75,12,'+rsvpBloom*0.28+')');
      ctx.fillStyle=amber;ctx.fillRect(0,H*0.6,W,H*0.4);
    }}

    // Head image
    var headA;
    if      (p<0.02) headA=ss(0,0.02,p);
    else if (p<0.25) headA=1.0;
    else if (p<0.40) headA=1.0-ss(0.25,0.40,p)*0.55;
    else             headA=0.45*(1-ss(0.40,0.52,p));
    if(headA>0.003&&headImg.complete&&headImg.naturalWidth>0){
      var iA=headImg.naturalWidth/headImg.naturalHeight;
      var hH=H*0.84,hW=hH*iA;
      ctx.save();ctx.globalAlpha=headA;
      ctx.drawImage(headImg,cx-hW*0.5,cy-hH*0.5-H*0.02,hW,hH);
      ctx.restore();
    }

    // LocalGlobe Presents
    var lgA=ss(0,0.02,p)*(1-ss(0.06,0.11,p));
    if(lgA>0.003){
      ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font=clamp(W*0.010,9,15)+'px '+NF;
      ctx.fillStyle='rgba(240,234,216,'+lgA*0.5+')';
      ctx.fillText('LocalGlobe Presents',cx,H*0.10);
      ctx.restore();
    }

    // Open Court — clean then dissolve
    if(p<0.22){
      var ocA=p<0.07?ss(0,0.07,p):1.0;
      if(p<0.10){
        var sz=clamp(W*0.13,54,188);
        ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.font=sz+'px '+NF;
        ctx.fillStyle='rgba(240,234,216,'+ocA+')';
        ctx.fillText('Open', cx,H*0.44-sz*0.55);
        ctx.fillText('Court',cx,H*0.44+sz*0.55);
        ctx.restore();
      }else{
        var dT=ss(0.10,0.22,p);
        var total=dOrder.length;
        var surv=Math.floor(total*(1-dT));
        renderOC(ocA);
        ctx.save();
        for(var bi=0;bi<surv;bi++){
          var idx=dOrder[bi];
          var bx=(idx%dW)*BLOCK,by=Math.floor(idx/dW)*BLOCK;
          ctx.drawImage(offCanvas,bx*dpr,by*dpr,BLOCK*dpr,BLOCK*dpr,bx,by,BLOCK,BLOCK);
        }
        var flashT=dT*(1-dT)*4;
        if(flashT>0.05){
          var fc=Math.floor(total*flashT*0.18);
          for(var fi=surv;fi<surv+fc;fi++){
            if(fi>=total)break;
            var fidx=dOrder[fi];
            var fbx=(fidx%dW)*BLOCK,fby=Math.floor(fidx/dW)*BLOCK;
            ctx.fillStyle=fidx%3!==0
              ?'rgba(77,217,184,'+flashT*0.75+')'
              :'rgba(45,120,100,'+flashT*0.55+')';
            ctx.fillRect(fbx,fby,BLOCK,BLOCK);
          }
        }
        ctx.restore();
      }
    }

    // Project Europe Takeover
    var peIn =ss(0.16,0.26,p),peOut=ss(0.34,0.40,p),peA=peIn*(1-peOut);
    if(peA>0.003){
      var peSz=clamp(W*0.092,40,136),tkSz=clamp(W*0.060,26,88);
      var surge=(1-peIn)*H*0.04;
      ctx.save();ctx.translate(cx,H*0.44+surge);
      ctx.textAlign='center';ctx.textBaseline='middle';
      var glowR=peSz*2.8*peIn;
      var glw=ctx.createRadialGradient(0,0,0,0,0,glowR);
      glw.addColorStop(0,'rgba(77,217,184,'+peA*0.18+')');
      glw.addColorStop(0.5,'rgba(77,217,184,'+peA*0.05+')');
      glw.addColorStop(1,'rgba(77,217,184,0)');
      ctx.fillStyle=glw;ctx.beginPath();ctx.arc(0,0,glowR,0,Math.PI*2);ctx.fill();
      ctx.font=peSz+'px '+NF;
      ctx.fillStyle='rgba(240,234,216,'+peA+')';
      ctx.fillText('Project Europe',0,-peSz*0.60);
      var tkDelay=ss(0.19,0.28,p)*(1-peOut);
      ctx.font=tkSz+'px '+NF;
      ctx.fillStyle='rgba(77,217,184,'+tkDelay+')';
      ctx.fillText('Takeover',0,tkSz*0.52);
      ctx.restore();
    }

    // An Anthology — bigger, standalone
    var anthA=ss(0.40,0.46,p)*(1-ss(0.52,0.57,p));
    if(anthA>0.003){
      ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font=clamp(W*0.030,18,44)+'px '+NF;
      ctx.fillStyle='rgba(240,234,216,'+anthA*0.88+')';
      ctx.fillText('An Anthology of',cx,H*0.476);
      ctx.fillText('European Excellence',cx,H*0.524);
      ctx.restore();
    }

    // Featuring + breathing speaker links
    var spIn=ss(0.56,0.63,p),spOut=ss(0.72,0.78,p),spA=spIn*(1-spOut);
    var ftA=ss(0.54,0.61,p)*(1-spOut);
    featLabel.style.opacity=ftA>0.003?ftA:0;
    featLabel.style.top=(H*0.34)+'px';
    featLabel.style.pointerEvents='none';
    var cerB=1+Math.sin(T*1.2)*0.025;
    var renB=1+Math.sin(T*1.2+1.2)*0.022;
    if(spA>0.003){
      linkCer.style.opacity=spA;
      linkCer.style.transform='scale('+cerB+')';
      linkCer.style.pointerEvents='all';
      var renA=ss(0.59,0.66,p)*(1-spOut);
      linkRen.style.opacity=renA;
      linkRen.style.transform='scale('+renB+')';
      linkRen.style.pointerEvents=renA>0.1?'all':'none';
    }else{
      linkCer.style.opacity=0;linkCer.style.pointerEvents='none';
      linkRen.style.opacity=0;linkRen.style.pointerEvents='none';
    }

    // ── RSVP SCENE ────────────────────────────────────────────────────────────
    // Pixel noise clears block-by-block across the screen (p 0.78→0.91)
    // then DOM RSVP layer fades in clean on top (p 0.89+)
    // NO content is drawn to offscreen — blocks are solid teal noise that
    // scatter away, leaving the background. DOM handles all readable content.
    var assembleT = ss(0.78, 0.91, p);
    var rsvpFull  = ss(0.89, 0.96, p);

    if(assembleT > 0.003 && assembleT < 0.999) {
      var total = rOrder.length;
      var cleared = Math.floor(total * assembleT); // blocks that have scattered
      ctx.save();
      // Draw teal static blocks over the uncleared portion
      for(var ai = cleared; ai < total; ai++) {
        var idx = rOrder[ai];
        var bx  = (idx % dW) * BLOCK;
        var by  = Math.floor(idx / dW) * BLOCK;
        // Vary the teal shade per block for a more textured static look
        var shade = (idx * 37 + 91) % 60; // 0-59
        ctx.fillStyle = 'rgba(' + (8+shade*0.3|0) + ',' + (44+shade*0.7|0) + ',' + (34+shade*0.5|0) + ',1)';
        ctx.fillRect(bx, by, BLOCK, BLOCK);
      }
      // Teal + amber frontier flash at the clearing edge
      var aFlash = assembleT * (1 - assembleT) * 4;
      if(aFlash > 0.04) {
        var afc = Math.floor(total * aFlash * 0.20);
        for(var af = cleared; af < cleared + afc; af++) {
          if(af >= total) break;
          var aidx = rOrder[af];
          var abx  = (aidx % dW) * BLOCK;
          var aby  = Math.floor(aidx / dW) * BLOCK;
          ctx.fillStyle = aidx % 3 !== 0
            ? 'rgba(77,217,184,' + aFlash * 0.85 + ')'
            : 'rgba(196,117,30,' + aFlash * 0.55 + ')';
          ctx.fillRect(abx, aby, BLOCK, BLOCK);
        }
      }
      ctx.restore();
    }

    // DOM RSVP fades in once static has cleared
    if(rsvpFull > 0.003 && !rsvpDOMShowing) {
      rsvpDOMShowing = true;
      rsvpScene.classList.add('show');
      triggerBtnAssembly();
    } else if(rsvpFull <= 0.003 && rsvpDOMShowing) {
      rsvpDOMShowing = false;
      rsvpScene.classList.remove('show');
    }

    document.getElementById('hint').classList.toggle('hide',p>0.03);

    // Canvas button — drawn on main canvas, no DOM element visuals
    if(p > 0.88) {
      drawCanvasButton(cx, H*0.69, p, T);
    } else {
      resetBtnAssembly();
    }
  }


  


  // ── CANVAS-DRAWN BUTTON ──────────────────────────────────────────────────
  // All visuals on main canvas. DOM #rsvp-btn is invisible click-target only.
  var btnAssembleStart = -1;  // timestamp when assembly began
  var btnAssembleDone  = false;
  var btnRect          = null; // {x,y,w,h} in canvas coords
  var btnHovered       = false;
  var BTN_BLOCK        = 4;
  var btnOrder         = null;
  var btnCols          = 0;

  function buildBtnOrder(cols, rows) {
    var total = cols * rows;
    var order = new Array(total);
    for(var i=0;i<total;i++) order[i]=i;
    var s=7331;
    for(var i=total-1;i>0;i--) {
      s=(s*1664525+1013904223)&0xffffffff;
      var j=(s>>>0)%(i+1);
      var t=order[i];order[i]=order[j];order[j]=t;
    }
    return order;
  }

  function triggerBtnAssembly() {
    if(btnAssembleStart>=0) return; // already running
    btnAssembleStart = performance.now();
    btnAssembleDone  = false;
    btnOrder = null; // rebuilt on first draw
  }

  function resetBtnAssembly() {
    btnAssembleStart = -1;
    btnAssembleDone  = false;
    btnOrder = null;
    var realBtn = document.getElementById('rsvp-btn');
    if(realBtn) realBtn.style.display='none';
  }

  function drawCanvasButton(cx, cy, p, T) {
    if(btnAssembleStart < 0) return;

    // Button geometry — fixed position on canvas
    var btn   = document.getElementById('rsvp-btn');
    var bFontSize = Math.round(Math.max(10, Math.min(14, W*0.011)));
    var bText = 'CLAIM YOUR SEAT';
    // Measure text to size the hit area
    ctx.font = bFontSize+'px '+NF;
    var textW = ctx.measureText(bText).width * 1.35; // account for letter-spacing
    var padX  = clamp(W*0.06, 32, 52);
    var padY  = clamp(H*0.02, 12, 20);
    var bw    = textW + padX*2;
    var bh    = bFontSize + padY*2;
    var bx    = cx - bw/2;
    var by    = H*0.69 - bh/2;
    btnRect   = {x:bx, y:by, w:bw, h:bh};

    // Size and position the invisible DOM click-target
    if(btn) {
      btn.style.width    = bw+'px';
      btn.style.height   = bh+'px';
      btn.style.left     = bx+'px';
      btn.style.top      = by+'px';
    }

    var elapsed  = performance.now() - btnAssembleStart;
    var duration = 1000;
    var t        = Math.min(elapsed/duration, 1);
    var tEased   = t*t*(3-2*t);

    var cols = Math.ceil(bw/BTN_BLOCK);
    var rows = Math.ceil(bh/BTN_BLOCK);
    if(!btnOrder || btnCols !== cols) {
      btnCols  = cols;
      btnOrder = buildBtnOrder(cols, rows);
    }

    var total    = btnOrder.length;
    var revealed = Math.floor(total * tEased);

    if(!btnAssembleDone) {
      // Only draw the teal+amber frontier flash — no white fill blocks
      var flash = tEased*(1-tEased)*4;
      if(flash>0.05) {
        var fc = Math.floor(total*flash*0.4);
        for(var fi=revealed; fi<revealed+fc; fi++) {
          if(fi>=total) break;
          var fidx = btnOrder[fi];
          var fbx  = bx+(fidx%cols)*BTN_BLOCK;
          var fby  = by+Math.floor(fidx/cols)*BTN_BLOCK;
          ctx.fillStyle = fidx%3!==0
            ?'rgba(77,217,184,'+flash*0.95+')'
            :'rgba(196,117,30,'+flash*0.65+')';
          ctx.fillRect(fbx, fby, BTN_BLOCK, BTN_BLOCK);
        }
      }

      if(t >= 1) {
        btnAssembleDone = true;
        // Make DOM button clickable
        if(btn) { btn.style.display='block'; }
      }
    }

    if(btnAssembleDone) {
      // Draw final text with breathing scale + hover colour
      var breathe = 1 + Math.sin(T*2.1)*0.03;
      var col = btnHovered
        ? 'rgba(196,117,30,1)'
        : 'rgba(240,234,216,0.92)';
      ctx.save();
      ctx.translate(cx, by+bh/2);
      ctx.scale(breathe, breathe);
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.font = bFontSize+'px '+NF;
      ctx.fillStyle = col;
      // Manual letter spacing
      var ls = bFontSize*0.28;
      var chars = bText.split('');
      var tw=0;
      var cws=[];
      for(var ci=0;ci<chars.length;ci++){
        var cw=ctx.measureText(chars[ci]).width+ls;
        cws.push(cw); tw+=cw;
      }
      var sx=-tw/2;
      for(var ci=0;ci<chars.length;ci++){
        ctx.fillText(chars[ci], sx+cws[ci]/2-ls/2, 0);
        sx+=cws[ci];
      }
      ctx.restore();
    }
  }

  // Hover detection via mousemove on window
  window.addEventListener('mousemove', function(e) {
    if(!btnRect || !btnAssembleDone) { btnHovered=false; return; }
    btnHovered = (e.clientX>=btnRect.x && e.clientX<=btnRect.x+btnRect.w &&
                  e.clientY>=btnRect.y && e.clientY<=btnRect.y+btnRect.h);
  });

  requestAnimationFrame(frame);
})();
</script>
</body>
